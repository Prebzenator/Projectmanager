<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project</title>
    <link rel="stylesheet" href="styles.css">
    <script src="project.js" defer></script>
</head>

<body>

<header>
    <h1>Project Tasks</h1>
</header>

<main>

    <section id="task-list-section">
        <h2>Tasks</h2>
        <div id="task-list" class="card-container"></div>
    </section>

    <hr>

    <section id="create-task-section">
        <h2>Create Task</h2>

        <form id="task-form" class="task-form">

            <label>Name:</label>
            <input type="text" id="task-name" required>

            <label>Estimated Hours:</label>
            <input type="number" id="task-hours" required>

            <label>Deadline:</label>
            <input type="date" id="task-deadline" required>

            <label>Priority (1–5):</label>
            <input type="number" id="task-priority" min="1" max="5" value="1" required>

            <label>Dependencies:</label>
            <select id="task-dependencies" multiple></select>

            <label>Required Qualities:</label>
            <select id="task-qualities" multiple></select>

            <label>Required Constraints:</label>
            <select id="task-constraints" multiple></select>

            <button type="submit" class="primary-btn">Create Task</button>
        </form>

        <p id="task-response"></p>
    </section>

    <hr>

    <section id="generate-plan-section">
        <h2>Generate Project Plan</h2>

        <label>Mode:</label>
        <select id="plan-mode">
            <option value="fastest">Fastest Completion</option>
            <option value="thorough">Most Thorough</option>
        </select>

        <button id="generate-plan-btn" class="primary-btn">Generate Plan</button>

        <p id="plan-response"></p>
    </section>

    <hr>

    <section id="view-plan-section">
        <h2>View Plan</h2>
        <button id="view-plan-btn" class="primary-btn">Open Plan Page</button>
    </section>

</main>

</body>
</html>
