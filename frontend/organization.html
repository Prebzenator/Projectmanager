<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Organization</title>
    <link rel="stylesheet" href="organization.css">
    <script src="organization.js" defer></script>
</head>

<body>

<header class="top-bar">
    <h1 id="org-name">Organization</h1>
</header>

<main class="board">

    <!-- PROJECTS -->
    <section class="column">
        <h2>Projects</h2>

        <form id="project-form" class="inline-form">
            <input type="text" id="project-name" placeholder="Project name" required>
            <input type="number" id="project-duration" placeholder="Duration (weeks)" required>
            <button type="submit" class="primary-btn">Add</button>
        </form>

        <div class="card-container" id="projects-list"></div>
    </section>

    <!-- MEMBERS -->
    <section class="column">
        <h2>Members</h2>

        <form id="member-form" class="inline-form">
            <input type="text" id="member-name" placeholder="Name" required>
            <input type="text" id="member-role" placeholder="Role" required>

            <label>Qualities:</label>
            <select id="member-qualities" multiple></select>

            <label>Constraints:</label>
            <select id="member-constraints" multiple></select>

            <button type="submit">Add</button>
        </form>

        <div class="card-container" id="members-list"></div>
    </section>

    <!-- QUALITIES -->
    <section class="column">
        <h2>Qualities</h2>

        <form id="quality-form" class="inline-form">
            <input type="text" id="quality-name" placeholder="Name" required>
            <input type="text" id="quality-description" placeholder="Description">
            <button type="submit">Add</button>
        </form>

        <div class="card-container" id="qualities-list"></div>
    </section>

    <!-- CONSTRAINTS -->
    <section class="column">
        <h2>Constraints</h2>

        <form id="constraint-form" class="inline-form">
            <input type="text" id="constraint-name" placeholder="Name" required>
            <input type="text" id="constraint-description" placeholder="Description">
            <button type="submit">Add</button>
        </form>

        <div class="card-container" id="constraints-list"></div>
    </section>

</main>

</body>
</html>
