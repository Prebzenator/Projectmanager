<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Project Planner</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body>

    <header>
        <h1>Project Planner</h1>
    </header>

    <main>

        <!-- Organization Section -->
<section id="org-section">
    <h2>Organization</h2>

    <!-- Create org -->
    <div>
        <input type="text" id="org-name" placeholder="Organization name">
        <input type="text" id="org-description" placeholder="Description (optional)">
        <button onclick="createOrganization()">Create Organization</button>
        <p id="org-response"></p>
    </div>

    <!-- Current org status -->
    <div id="org-status"></div>

    <hr>

    <!-- Add Quality -->
    <div>
        <h3>Add Quality</h3>
        <input type="text" id="quality-name" placeholder="e.g. Python">
        <input type="text" id="quality-desc" placeholder="Description (optional)">
        <button onclick="addQuality()">Add Quality</button>
    </div>

    <hr>

    <!-- Add Constraint -->
    <div>
        <h3>Add Constraint</h3>
        <input type="text" id="constraint-name" placeholder="e.g. No weekends">
        <input type="text" id="constraint-desc" placeholder="Description (optional)">
        <button onclick="addConstraint()">Add Constraint</button>
    </div>
</section>

<hr>
        <!-- Task List Section -->
        <section id="task-list-section">
            <h2>Tasks</h2>
            <div id="task-list">
                <!-- Tasks will be inserted here by app.js -->
            </div>
        </section>

        <hr>

        <!-- Create Task Section -->
        <section id="create-task-section">
            <h2>Create New Task</h2>

            <form id="task-form">

                <label for="task-name">Name:</label>
                <input type="text" id="task-name" required>

                <label for="task-hours">Estimated Hours:</label>
                <input type="number" id="task-hours" required>

                <label for="task-deadline">Deadline:</label>
                <input type="date" id="task-deadline" required>

                <label for="task-priority">Priority (1–5):</label>
                <input type="number" id="task-priority" min="1" max="5" value="1" required>

                <label for="task-dependencies">Dependencies (optional):</label>
                <select id="task-dependencies" multiple>
                    <!-- Options will be added dynamically -->
                </select>

                <button type="submit">Create Task</button>
            </form>

            <p id="response"></p>
        </section>

    </main>

</body>
</html>
