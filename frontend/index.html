<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Project Planner</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body>

<header>
    <h1>Project Planner</h1>
</header>

<main>

    <!-- Create Organization -->
    <section id="create-organization-section">
        <h2>Create Organization</h2>

        <form id="organization-form">
            <label for="org-name">Name:</label>
            <input type="text" id="org-name" required>

            <label for="org-description">Description:</label>
            <input type="text" id="org-description">

            <button type="submit">Create Organization</button>
        </form>

        <p id="org-response"></p>
    </section>

    <section id="organization-entry" style="display:none;">
        <h2>Organization</h2>
        <div id="org-card"></div>
        <button id="open-org-btn" class="primary-btn">Open Organization</button>
    </section>

</main>

</body>
</html>
